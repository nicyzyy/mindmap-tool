<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 MindMap - 思维导图</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent2: #00cec9;
    --accent3: #fd79a8;
    --accent4: #fdcb6e;
    --node-bg: #1e1e2e;
    --node-active: #2a2a4a;
    --line: #3a3a5a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border); z-index: 100;
    flex-shrink: 0;
  }
  .toolbar h1 { font-size: 18px; font-weight: 600; margin-right: 16px; }
  .toolbar h1 span { color: var(--accent); }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--node-bg); color: var(--text); cursor: pointer;
    font-size: 13px; transition: all .15s;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.danger:hover { background: #e74c3c; border-color: #e74c3c; }
  .file-tabs {
    display: flex; gap: 4px; margin-left: 8px; flex: 1; overflow-x: auto;
  }
  .file-tab {
    padding: 5px 12px; border-radius: 6px 6px 0 0; background: var(--bg);
    border: 1px solid var(--border); border-bottom: none; cursor: pointer;
    font-size: 13px; color: var(--text-dim); white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .file-tab.active { background: var(--surface); color: var(--text); border-color: var(--accent); }
  .file-tab .close-tab { opacity: 0.4; font-size: 11px; }
  .file-tab .close-tab:hover { opacity: 1; color: #e74c3c; }
  .shortcuts { font-size: 11px; color: var(--text-dim); margin-left: auto; }
  .shortcuts kbd {
    background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    padding: 1px 5px; font-family: monospace; font-size: 11px;
  }

  /* Canvas */
  .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  #canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    cursor: grab;
  }
  #canvas.dragging { cursor: grabbing; }
  .map-container {
    position: absolute; transform-origin: 0 0;
  }

  /* Nodes */
  .node {
    position: absolute; display: flex; align-items: center;
    min-width: 80px; cursor: pointer; user-select: none;
  }
  .node-content {
    padding: 8px 16px; border-radius: 8px; font-size: 14px;
    border: 2px solid transparent; transition: all .15s;
    background: var(--node-bg); white-space: nowrap;
    min-width: 60px; outline: none;
  }
  .node.depth-0 .node-content {
    font-size: 18px; font-weight: 700; padding: 12px 24px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff; border-radius: 12px;
  }
  .node.depth-1 .node-content { border-color: var(--accent2); font-weight: 500; }
  .node.depth-2 .node-content { border-color: var(--accent3); }
  .node.depth-3 .node-content { border-color: var(--accent4); }
  .node.selected .node-content { box-shadow: 0 0 0 3px rgba(108,92,231,0.5); }
  .node .node-content:focus { box-shadow: 0 0 0 3px rgba(108,92,231,0.8); }
  .node.depth-0.selected .node-content { box-shadow: 0 0 0 3px rgba(255,255,255,0.3); }

  /* SVG lines */
  svg.lines {
    position: absolute; top: 0; left: 0; pointer-events: none;
    width: 10000px; height: 10000px;
  }
  svg.lines path { fill: none; stroke: var(--line); stroke-width: 2; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 24px; background: var(--accent); color: #fff;
    border-radius: 8px; font-size: 14px; z-index: 999;
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Save Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; min-width: 360px;
  }
  .modal h2 { margin-bottom: 16px; font-size: 16px; }
  .modal input {
    width: 100%; padding: 8px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 14px; margin-bottom: 12px;
  }
  .modal textarea {
    width: 100%; height: 200px; padding: 8px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 12px; font-family: monospace;
    margin-bottom: 12px; resize: vertical;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>🧠 <span>MindMap</span></h1>
  <button class="btn" onclick="newFile()">📄 新建</button>
  <button class="btn" onclick="showSaveModal()">💾 保存</button>
  <button class="btn" onclick="showLoadModal()">📂 加载</button>
  <button class="btn" onclick="exportJSON()">📤 导出JSON</button>
  <button class="btn" onclick="exportMarkdown()">📝 导出MD</button>
  <div class="file-tabs" id="fileTabs"></div>
  <div class="shortcuts">
    <kbd>Enter</kbd> 子节点 &nbsp;
    <kbd>Tab</kbd> 兄弟节点 &nbsp;
    <kbd>Del</kbd> 删除 &nbsp;
    <kbd>F2</kbd> 编辑 &nbsp;
    <kbd>Space</kbd> 折叠
  </div>
</div>

<div class="canvas-wrap">
  <div id="canvas">
    <div class="map-container" id="mapContainer">
      <svg class="lines" id="svgLines"></svg>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Save Modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <h2>💾 保存思维导图</h2>
    <input id="saveName" placeholder="文件名（如：项目规划）" />
    <div class="modal-actions">
      <button class="btn" onclick="closeSaveModal()">取消</button>
      <button class="btn" onclick="doSave()" style="background:var(--accent);border-color:var(--accent);color:#fff">保存</button>
    </div>
  </div>
</div>

<!-- Load Modal -->
<div class="modal-overlay" id="loadModal">
  <div class="modal">
    <h2>📂 加载思维导图</h2>
    <div id="savedList" style="max-height:300px;overflow-y:auto;margin-bottom:12px"></div>
    <h3 style="font-size:14px;margin-bottom:8px">或粘贴JSON：</h3>
    <textarea id="loadJSON" placeholder='粘贴导出的JSON...'></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeLoadModal()">取消</button>
      <button class="btn" onclick="doLoadJSON()" style="background:var(--accent);border-color:var(--accent);color:#fff">加载</button>
    </div>
  </div>
</div>

<script>
// ========== Data Model ==========
let files = []; // {id, name, data: {nodes, nextId}}
let activeFileId = null;
let selectedNodeId = null;
let panX = 0, panY = 0, scale = 1;

const LEVEL_COLORS = ['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#a29bfe','#55efc4','#fab1a0','#ffeaa7'];
const H_GAP = 180, V_GAP = 8, NODE_H = 40;

function uid() { return 'n' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function createDefaultData(title = '中心主题') {
  const rootId = uid();
  return {
    nodes: { [rootId]: { id: rootId, text: title, children: [], parent: null, collapsed: false } },
    rootId,
    nextId: 1
  };
}

// ========== File Management ==========
function newFile(name) {
  name = name || '未命名导图 ' + (files.length + 1);
  const id = uid();
  const data = createDefaultData(name);
  files.push({ id, name, data });
  activeFileId = id;
  renderTabs();
  renderMap();
  selectNode(data.rootId);
}

function switchFile(id) {
  activeFileId = id;
  selectedNodeId = null;
  renderTabs();
  renderMap();
  const f = getFile();
  if (f) selectNode(f.data.rootId);
}

function closeFile(id) {
  files = files.filter(f => f.id !== id);
  if (activeFileId === id) {
    activeFileId = files.length ? files[0].id : null;
  }
  if (!files.length) newFile();
  renderTabs();
  renderMap();
}

function getFile() { return files.find(f => f.id === activeFileId); }
function getData() { const f = getFile(); return f ? f.data : null; }

function renderTabs() {
  const el = document.getElementById('fileTabs');
  el.innerHTML = files.map(f => `
    <div class="file-tab ${f.id === activeFileId ? 'active' : ''}" onclick="switchFile('${f.id}')">
      ${esc(f.name)}
      <span class="close-tab" onclick="event.stopPropagation();closeFile('${f.id}')">✕</span>
    </div>
  `).join('');
}

// ========== Layout Engine ==========
function layoutTree(data) {
  const positions = {};
  if (!data || !data.rootId) return positions;

  function getHeight(nodeId) {
    const node = data.nodes[nodeId];
    if (!node) return NODE_H;
    if (node.collapsed || !node.children.length) return NODE_H;
    let total = 0;
    node.children.forEach((cid, i) => {
      total += getHeight(cid);
      if (i < node.children.length - 1) total += V_GAP;
    });
    return Math.max(NODE_H, total);
  }

  function layout(nodeId, x, y, depth) {
    const node = data.nodes[nodeId];
    if (!node) return;
    positions[nodeId] = { x, y, depth };
    if (node.collapsed || !node.children.length) return;
    const totalH = getHeight(nodeId);
    let cy = y - totalH / 2;
    node.children.forEach((cid, i) => {
      const ch = getHeight(cid);
      layout(cid, x + H_GAP, cy + ch / 2, depth + 1);
      cy += ch + V_GAP;
    });
  }

  layout(data.rootId, 200, 400, 0);
  return positions;
}

// ========== Rendering ==========
function renderMap() {
  const data = getData();
  const container = document.getElementById('mapContainer');
  const svg = document.getElementById('svgLines');

  // Clear old nodes (keep svg)
  container.querySelectorAll('.node').forEach(n => n.remove());
  svg.innerHTML = '';

  if (!data) return;
  const positions = layoutTree(data);

  // Draw lines
  Object.entries(data.nodes).forEach(([id, node]) => {
    if (!node.children.length || node.collapsed) return;
    const p = positions[id];
    if (!p) return;
    const px = p.x + 100; // approx right edge
    const py = p.y;
    node.children.forEach(cid => {
      const c = positions[cid];
      if (!c) return;
      const cx = c.x;
      const cy = c.y;
      const mx = (px + cx) / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const color = LEVEL_COLORS[Math.min(c.depth, LEVEL_COLORS.length - 1)];
      path.setAttribute('d', `M${px},${py} C${mx},${py} ${mx},${cy} ${cx},${cy}`);
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-opacity', '0.5');
      svg.appendChild(path);
    });
  });

  // Draw nodes
  Object.entries(positions).forEach(([id, pos]) => {
    const node = data.nodes[id];
    if (!node) return;
    const div = document.createElement('div');
    div.className = `node depth-${Math.min(pos.depth, 3)} ${id === selectedNodeId ? 'selected' : ''}`;
    div.style.left = pos.x + 'px';
    div.style.top = (pos.y - NODE_H / 2) + 'px';
    div.dataset.id = id;
    const hasKids = node.children.length > 0;
    const collapseIcon = hasKids ? (node.collapsed ? ' ▶' : '') : '';
    div.innerHTML = `<div class="node-content" tabindex="-1">${esc(node.text)}${collapseIcon}</div>`;
    div.addEventListener('click', (e) => { e.stopPropagation(); selectNode(id); });
    div.addEventListener('dblclick', (e) => { e.stopPropagation(); editNode(id); });
    container.appendChild(div);
  });

  applyTransform();
}

function applyTransform() {
  const c = document.getElementById('mapContainer');
  c.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}

function selectNode(id) {
  selectedNodeId = id;
  document.querySelectorAll('.node').forEach(n => {
    n.classList.toggle('selected', n.dataset.id === id);
  });
}

function editNode(id) {
  const data = getData();
  if (!data || !data.nodes[id]) return;
  const node = data.nodes[id];
  const domNode = document.querySelector(`.node[data-id="${id}"] .node-content`);
  if (!domNode) return;
  domNode.textContent = node.text;
  domNode.contentEditable = true;
  domNode.focus();
  // Select all text
  const range = document.createRange();
  range.selectNodeContents(domNode);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  const finish = () => {
    domNode.contentEditable = false;
    const newText = domNode.textContent.trim() || node.text;
    node.text = newText;
    renderMap();
    selectNode(id);
  };
  domNode.addEventListener('blur', finish, { once: true });
  domNode.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); domNode.blur(); }
    if (e.key === 'Escape') { domNode.textContent = node.text; domNode.blur(); }
  });
}

// ========== Node Operations ==========
function addChild(parentId) {
  const data = getData();
  if (!data || !data.nodes[parentId]) return;
  const newId = uid();
  data.nodes[newId] = { id: newId, text: '新节点', children: [], parent: parentId, collapsed: false };
  data.nodes[parentId].children.push(newId);
  data.nodes[parentId].collapsed = false;
  renderMap();
  selectNode(newId);
  setTimeout(() => editNode(newId), 50);
}

function addSibling(nodeId) {
  const data = getData();
  if (!data) return;
  const node = data.nodes[nodeId];
  if (!node || !node.parent) return; // Can't add sibling to root
  const parent = data.nodes[node.parent];
  const idx = parent.children.indexOf(nodeId);
  const newId = uid();
  data.nodes[newId] = { id: newId, text: '新节点', children: [], parent: node.parent, collapsed: false };
  parent.children.splice(idx + 1, 0, newId);
  renderMap();
  selectNode(newId);
  setTimeout(() => editNode(newId), 50);
}

function deleteNode(nodeId) {
  const data = getData();
  if (!data) return;
  const node = data.nodes[nodeId];
  if (!node || !node.parent) return; // Can't delete root

  function removeTree(id) {
    const n = data.nodes[id];
    if (n) { n.children.forEach(c => removeTree(c)); delete data.nodes[id]; }
  }

  const parent = data.nodes[node.parent];
  const idx = parent.children.indexOf(nodeId);
  parent.children.splice(idx, 1);
  removeTree(nodeId);
  renderMap();
  selectNode(node.parent);
}

function toggleCollapse(nodeId) {
  const data = getData();
  if (!data || !data.nodes[nodeId]) return;
  data.nodes[nodeId].collapsed = !data.nodes[nodeId].collapsed;
  renderMap();
  selectNode(nodeId);
}

// ========== Keyboard ==========
document.addEventListener('keydown', (e) => {
  // Ignore when editing
  if (document.activeElement?.contentEditable === 'true' || document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA') return;

  const data = getData();
  if (!data || !selectedNodeId) return;

  if (e.key === 'Enter') {
    e.preventDefault();
    addChild(selectedNodeId);
  } else if (e.key === 'Tab') {
    e.preventDefault();
    addSibling(selectedNodeId);
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    e.preventDefault();
    deleteNode(selectedNodeId);
  } else if (e.key === 'F2') {
    e.preventDefault();
    editNode(selectedNodeId);
  } else if (e.key === ' ') {
    e.preventDefault();
    toggleCollapse(selectedNodeId);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    navigateNode(e.key);
  }
});

function navigateNode(key) {
  const data = getData();
  const node = data.nodes[selectedNodeId];
  if (!node) return;
  if (key === 'ArrowLeft' && node.parent) {
    selectNode(node.parent);
  } else if (key === 'ArrowRight' && node.children.length && !node.collapsed) {
    selectNode(node.children[0]);
  } else if ((key === 'ArrowUp' || key === 'ArrowDown') && node.parent) {
    const siblings = data.nodes[node.parent].children;
    const idx = siblings.indexOf(node.id);
    const next = key === 'ArrowUp' ? idx - 1 : idx + 1;
    if (next >= 0 && next < siblings.length) selectNode(siblings[next]);
  }
}

// ========== Pan & Zoom ==========
const canvas = document.getElementById('canvas');
let isPanning = false, startX, startY;

canvas.addEventListener('mousedown', (e) => {
  if (e.target === canvas || e.target.id === 'mapContainer' || e.target.tagName === 'svg' || e.target.tagName === 'path') {
    isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY;
    canvas.classList.add('dragging');
  }
});
window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  panX = e.clientX - startX; panY = e.clientY - startY;
  applyTransform();
});
window.addEventListener('mouseup', () => { isPanning = false; canvas.classList.remove('dragging'); });
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.2, Math.min(3, scale * delta));
  applyTransform();
}, { passive: false });

// ========== Save/Load ==========
function showSaveModal() {
  const f = getFile();
  if (f) document.getElementById('saveName').value = f.name;
  document.getElementById('saveModal').classList.add('show');
  document.getElementById('saveName').focus();
}
function closeSaveModal() { document.getElementById('saveModal').classList.remove('show'); }

function doSave() {
  const f = getFile();
  if (!f) return;
  const name = document.getElementById('saveName').value.trim() || f.name;
  f.name = name;

  // Save to localStorage
  const saved = JSON.parse(localStorage.getItem('mindmaps') || '{}');
  saved[name] = { data: f.data, savedAt: new Date().toISOString() };
  localStorage.setItem('mindmaps', JSON.stringify(saved));

  closeSaveModal();
  renderTabs();
  toast('✅ 已保存: ' + name);

  // Also post to parent if in iframe (for MCP save)
  try { window.parent.postMessage({ type: 'mindmap-save', name, data: f.data }, '*'); } catch(e) {}
}

function showLoadModal() {
  const saved = JSON.parse(localStorage.getItem('mindmaps') || '{}');
  const list = document.getElementById('savedList');
  const names = Object.keys(saved);
  if (!names.length) {
    list.innerHTML = '<div style="color:var(--text-dim);padding:8px">暂无保存的导图</div>';
  } else {
    list.innerHTML = names.map(n => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px;border-bottom:1px solid var(--border)">
        <span style="cursor:pointer" onclick="doLoad('${esc(n)}')">${esc(n)}</span>
        <div style="display:flex;gap:6px">
          <button class="btn" onclick="doLoad('${esc(n)}')" style="padding:3px 10px;font-size:12px">打开</button>
          <button class="btn danger" onclick="doDelete('${esc(n)}')" style="padding:3px 10px;font-size:12px">删除</button>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('loadModal').classList.add('show');
}
function closeLoadModal() { document.getElementById('loadModal').classList.remove('show'); }

function doLoad(name) {
  const saved = JSON.parse(localStorage.getItem('mindmaps') || '{}');
  if (!saved[name]) return;
  const id = uid();
  files.push({ id, name, data: saved[name].data });
  activeFileId = id;
  closeLoadModal();
  renderTabs();
  renderMap();
  selectNode(saved[name].data.rootId);
  toast('📂 已加载: ' + name);
}

function doDelete(name) {
  const saved = JSON.parse(localStorage.getItem('mindmaps') || '{}');
  delete saved[name];
  localStorage.setItem('mindmaps', JSON.stringify(saved));
  showLoadModal();
  toast('🗑 已删除: ' + name);
}

function doLoadJSON() {
  try {
    const json = document.getElementById('loadJSON').value.trim();
    if (!json) return;
    const obj = JSON.parse(json);
    const id = uid();
    const name = obj.name || '导入的导图';
    files.push({ id, name, data: obj.data || obj });
    activeFileId = id;
    closeLoadModal();
    renderTabs();
    renderMap();
    toast('📂 已加载JSON');
  } catch(e) { toast('❌ JSON格式错误'); }
}

// ========== Export ==========
function exportJSON() {
  const f = getFile();
  if (!f) return;
  const json = JSON.stringify({ name: f.name, data: f.data }, null, 2);
  downloadText(json, f.name + '.json', 'application/json');
  toast('📤 已导出JSON');
}

function exportMarkdown() {
  const f = getFile();
  if (!f) return;
  const data = f.data;
  let md = '';
  function walk(nodeId, depth) {
    const node = data.nodes[nodeId];
    if (!node) return;
    if (depth === 0) md += '# ' + node.text + '\n\n';
    else md += '  '.repeat(depth - 1) + '- ' + node.text + '\n';
    node.children.forEach(c => walk(c, depth + 1));
  }
  walk(data.rootId, 0);
  downloadText(md, f.name + '.md', 'text/markdown');
  toast('📝 已导出Markdown');
}

function downloadText(text, filename, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename;
  a.click(); URL.revokeObjectURL(a.href);
}

// ========== MCP Integration ==========
// Listen for messages from parent (MCP load)
window.addEventListener('message', (e) => {
  if (e.data?.type === 'mindmap-load') {
    const { name, data } = e.data;
    const id = uid();
    files.push({ id, name, data });
    activeFileId = id;
    renderTabs();
    renderMap();
    toast('📂 MCP加载: ' + name);
  }
});

// ========== Utils ==========
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ========== Init ==========
newFile('中心主题');
// Center view
panX = 100; panY = 0;
applyTransform();
</script>
