<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 MindFlow — 思维导图</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #141418;
  --bg-warm: #17171c;
  --surface: #1c1c24;
  --surface2: #222230;
  --border: #2a2a38;
  --border-light: #34344a;
  --text: #d0d0dc;
  --text-soft: #9494a8;
  --text-dim: #606074;
  --sidebar-w: 250px;
  --toolbar-h: 44px;
  --status-h: 30px;
  --font: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);

  /* Node palette — neon on dark, XMind-inspired */
  --c0: #6c9fe7;    /* root: soft blue */
  --c0-bg: rgba(108,159,231,0.08);
  --c1: #e8a84c;    /* L1: warm amber */
  --c1-bg: rgba(232,168,76,0.06);
  --c2: #4ade80;    /* L2: green */
  --c2-bg: rgba(74,222,128,0.06);
  --c3: #e86cb5;    /* L3: pink */
  --c3-bg: rgba(232,108,181,0.06);
  --c4: #f0c246;    /* L4: gold */
  --c4-bg: rgba(240,194,70,0.06);
  --c5: #5ee8c5;    /* L5: teal */
  --c5-bg: rgba(94,232,197,0.06);
  --c6: #c084fc;    /* L6: purple */
  --c6-bg: rgba(192,132,252,0.06);
  --c7: #fb7185;    /* L7: coral */
  --c7-bg: rgba(251,113,133,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
::selection { background: rgba(108,159,231,0.25); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ===== Toolbar ===== */
.toolbar {
  height: var(--toolbar-h);
  display: flex; align-items: center; gap: 4px;
  padding: 0 14px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 100; flex-shrink: 0;
}
.logo {
  font-size: 14px; font-weight: 500; margin-right: 10px;
  display: flex; align-items: center; gap: 5px; color: var(--text-soft);
  letter-spacing: -0.2px;
}
.logo span { color: var(--c0); font-weight: 600; }
.btn {
  padding: 4px 10px; border-radius: 5px;
  border: 1px solid transparent;
  background: transparent; color: var(--text-dim);
  cursor: pointer; font-size: 11px; font-family: var(--font);
  transition: var(--transition); display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.btn:hover { background: var(--surface2); color: var(--text-soft); }
.btn.primary { background: rgba(108,159,231,0.12); color: var(--c0); }
.btn.primary:hover { background: rgba(108,159,231,0.2); }
.sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
.spacer { flex: 1; }
.kbd-hints { display: flex; gap: 8px; font-size: 10px; color: var(--text-dim); }
.kbd-hints span { display: flex; align-items: center; gap: 2px; }
kbd {
  background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  padding: 0 4px; font-family: var(--mono); font-size: 9px; line-height: 16px;
  color: var(--text-dim);
}

/* ===== Main Layout ===== */
.main { display: flex; flex: 1; overflow: hidden; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--bg-warm);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: width 0.25s ease; overflow: hidden; z-index: 50;
}
.sidebar.collapsed { width: 0; border-right: none; }
.sidebar-header {
  padding: 10px 12px 6px;
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-header h3 {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-dim);
}
.sidebar-toggle {
  width: 20px; height: 20px; border-radius: 4px;
  border: none; background: transparent; color: var(--text-dim);
  cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center;
}
.sidebar-toggle:hover { background: var(--surface); color: var(--text-soft); }
.sidebar-search {
  margin: 0 8px 6px; padding: 5px 8px;
  border-radius: 5px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 11px; font-family: var(--font); outline: none;
}
.sidebar-search:focus { border-color: var(--c0); }
.sidebar-search::placeholder { color: var(--text-dim); }
.file-list { flex: 1; overflow-y: auto; padding: 0 4px 8px; }
.file-item {
  padding: 7px 8px; border-radius: 5px; cursor: pointer;
  margin-bottom: 1px; transition: var(--transition);
  border: 1px solid transparent;
}
.file-item:hover { background: rgba(255,255,255,0.03); }
.file-item.active {
  background: rgba(108,159,231,0.08); border-color: rgba(108,159,231,0.15);
}
.file-item .file-name {
  font-size: 12px; font-weight: 500; margin-bottom: 1px;
  display: flex; align-items: center; justify-content: space-between;
}
.file-item .file-meta {
  font-size: 9px; color: var(--text-dim);
  display: flex; gap: 6px; align-items: center;
}
.file-item .ver-badge {
  background: var(--surface2); padding: 0 4px; border-radius: 3px;
  font-family: var(--mono); font-size: 8px; color: var(--text-dim);
}
.file-item .file-actions {
  opacity: 0; display: flex; gap: 1px; transition: var(--transition);
}
.file-item:hover .file-actions { opacity: 1; }
.file-action-btn {
  width: 18px; height: 18px; border: none; border-radius: 3px;
  background: transparent; color: var(--text-dim); cursor: pointer;
  font-size: 10px; display: flex; align-items: center; justify-content: center;
}
.file-action-btn:hover { background: var(--surface2); color: var(--text-soft); }

/* Version Panel */
.version-panel {
  border-top: 1px solid var(--border);
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
}
.version-panel.open { max-height: 220px; }
.version-panel-inner { padding: 8px; overflow-y: auto; max-height: 210px; }
.version-panel h4 {
  font-size: 10px; font-weight: 500; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 6px; padding: 0 4px;
}
.version-item {
  padding: 5px 6px; border-radius: 4px; cursor: pointer;
  font-size: 10px; margin-bottom: 1px; transition: var(--transition);
  display: flex; justify-content: space-between; align-items: center;
}
.version-item:hover { background: rgba(255,255,255,0.04); }
.version-item .ver-time { color: var(--text-soft); font-family: var(--mono); font-size: 9px; }
.version-item .ver-label { color: var(--text-dim); font-size: 9px; }
.version-item .ver-restore {
  opacity: 0; font-size: 9px; color: var(--c0); cursor: pointer; transition: var(--transition);
}
.version-item:hover .ver-restore { opacity: 1; }

/* ===== Canvas ===== */
.canvas-area { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
#canvas { position: absolute; inset: 0; cursor: grab; z-index: 1; }
#canvas.dragging { cursor: grabbing; }
.map-container { position: absolute; transform-origin: 0 0; }
svg.lines { position: absolute; top:0; left:0; pointer-events: none; width: 15000px; height: 15000px; }
svg.lines path { fill: none; stroke-linecap: round; }

/* ===== Nodes — XMind style: transparent + colored border/text ===== */
.node {
  position: absolute; display: flex; align-items: center;
  cursor: pointer; user-select: none;
}
.node-content {
  padding: 4px 12px; border-radius: 6px;
  font-size: 12px; font-family: var(--font); font-weight: 400;
  border: 1.5px solid var(--border);
  background: transparent;
  white-space: nowrap; min-width: 36px; outline: none;
  transition: var(--transition);
  line-height: 1.5;
}

/* Root node */
.node.depth-0 .node-content {
  font-size: 14px; font-weight: 600; padding: 6px 18px;
  border: 2px solid var(--c0); color: var(--c0);
  background: var(--c0-bg);
  border-radius: 10px; letter-spacing: -0.2px;
}
/* Depth colors */
.node.depth-1 .node-content { border-color: var(--c1); color: var(--c1); background: var(--c1-bg); }
.node.depth-2 .node-content { border-color: var(--c2); color: var(--c2); background: var(--c2-bg); }
.node.depth-3 .node-content { border-color: var(--c3); color: var(--c3); background: var(--c3-bg); }
.node.depth-4 .node-content { border-color: var(--c4); color: var(--c4); background: var(--c4-bg); }
.node.depth-5 .node-content { border-color: var(--c5); color: var(--c5); background: var(--c5-bg); }
.node.depth-6 .node-content { border-color: var(--c6); color: var(--c6); background: var(--c6-bg); }
.node.depth-7 .node-content { border-color: var(--c7); color: var(--c7); background: var(--c7-bg); }

.node.selected .node-content {
  box-shadow: 0 0 0 1.5px currentColor, 0 0 12px rgba(108,159,231,0.1);
}
.node .node-content:focus {
  box-shadow: 0 0 0 2px currentColor;
  background: rgba(255,255,255,0.04);
}
.node-count {
  position: absolute; right: -22px; top: 50%; transform: translateY(-50%);
  font-size: 8px; color: var(--text-dim); font-family: var(--mono);
  background: var(--surface2); padding: 0 4px; border-radius: 6px;
  border: 1px solid var(--border); line-height: 14px;
}

/* ===== Status Bar ===== */
.status-bar {
  height: var(--status-h);
  display: flex; align-items: center; gap: 14px;
  padding: 0 14px; background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 10px; color: var(--text-dim);
  z-index: 100; flex-shrink: 0;
}
.status-item { display: flex; align-items: center; gap: 3px; }
.status-dot { width: 5px; height: 5px; border-radius: 50%; }
.status-dot.saved { background: var(--c2); }
.status-dot.unsaved { background: var(--c1); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

/* ===== Zoom ===== */
.zoom-controls {
  position: absolute; bottom: 10px; right: 10px; z-index: 10;
  display: flex; gap: 1px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px; padding: 2px;
}
.zoom-btn {
  width: 26px; height: 24px; border: none; border-radius: 4px;
  background: transparent; color: var(--text-dim); cursor: pointer;
  font-size: 12px; display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.zoom-btn:hover { background: var(--surface2); color: var(--text-soft); }
.zoom-level {
  padding: 0 6px; font-size: 10px; color: var(--text-dim);
  font-family: var(--mono); display: flex; align-items: center;
}

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%) translateY(16px);
  padding: 6px 18px; background: var(--surface2);
  border: 1px solid var(--border); color: var(--text-soft);
  border-radius: 6px; font-size: 12px; z-index: 999;
  opacity: 0; transition: all 0.25s ease; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Modal ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; min-width: 360px;
}
.modal h2 { margin-bottom: 14px; font-size: 14px; font-weight: 500; }
.modal input, .modal textarea {
  width: 100%; padding: 7px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 12px; font-family: var(--font);
  margin-bottom: 10px; outline: none; transition: var(--transition);
}
.modal input:focus, .modal textarea:focus { border-color: var(--c0); }
.modal textarea { height: 160px; font-family: var(--mono); font-size: 11px; resize: vertical; }
.modal-actions { display: flex; gap: 6px; justify-content: flex-end; }

/* ===== Context Menu ===== */
.context-menu {
  position: fixed; z-index: 300;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px; min-width: 150px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.5); display: none;
}
.context-menu.show { display: block; }
.context-menu-item {
  padding: 5px 10px; border-radius: 4px; cursor: pointer;
  font-size: 11px; display: flex; align-items: center; gap: 6px;
  color: var(--text-soft); transition: var(--transition);
}
.context-menu-item:hover { background: rgba(108,159,231,0.1); color: var(--text); }
.context-menu-item.danger:hover { background: rgba(251,113,133,0.1); color: var(--c7); }
.context-menu-sep { height: 1px; background: var(--border); margin: 2px 6px; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="logo">🧠 <span>MindFlow</span></div>
  <button class="btn" onclick="newFile()">+ 新建</button>
  <div class="sep"></div>
  <button class="btn" onclick="saveCurrentFile()">💾 保存</button>
  <button class="btn" onclick="exportJSON()">↗ JSON</button>
  <button class="btn" onclick="exportMarkdown()">↗ MD</button>
  <button class="btn primary" onclick="syncToMCP()">🔄 MCP</button>
  <div class="sep"></div>
  <button class="btn" onclick="undo()">↩</button>
  <button class="btn" onclick="redo()">↪</button>
  <div class="spacer"></div>
  <div class="kbd-hints">
    <span><kbd>⏎</kbd> 兄弟</span>
    <span><kbd>⇥</kbd> 子级</span>
    <span><kbd>⌫</kbd> 删除</span>
    <span><kbd>F2</kbd> 编辑</span>
    <span><kbd>␣</kbd> 折叠</span>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>文件</h3>
      <button class="sidebar-toggle" onclick="toggleSidebar()">◀</button>
    </div>
    <input class="sidebar-search" placeholder="搜索..." oninput="filterFiles(this.value)" />
    <div class="file-list" id="fileList"></div>
    <div class="version-panel" id="versionPanel">
      <div class="version-panel-inner" id="versionList"></div>
    </div>
  </div>

  <div class="canvas-area">
    <div id="canvas">
      <div class="map-container" id="mapContainer">
        <svg class="lines" id="svgLines"></svg>
      </div>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <span class="zoom-level" id="zoomLevel">100%</span>
      <button class="zoom-btn" onclick="zoomOut()">−</button>
      <button class="zoom-btn" onclick="zoomFit()">◎</button>
    </div>
  </div>
</div>

<div class="status-bar">
  <button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebarToggleBtn" style="display:none">▶</button>
  <div class="status-item"><span class="status-dot saved" id="statusDot"></span><span id="statusSave">已保存</span></div>
  <div class="status-item" id="statusNodes">0 节点</div>
  <div class="status-item" id="statusDepth">0 层</div>
  <div class="spacer"></div>
  <div class="status-item" id="statusFile">—</div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="renameModal">
  <div class="modal"><h2>重命名</h2>
    <input id="renameInput" placeholder="名称" />
    <div class="modal-actions">
      <button class="btn" onclick="closeRenameModal()">取消</button>
      <button class="btn primary" onclick="doRename()">确定</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="importModal">
  <div class="modal"><h2>导入 JSON</h2>
    <textarea id="importJSON" placeholder="粘贴 JSON..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeImportModal()">取消</button>
      <button class="btn primary" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<div class="context-menu" id="ctxMenu">
  <div class="context-menu-item" onclick="ctxAction('rename')">✏️ 重命名</div>
  <div class="context-menu-item" onclick="ctxAction('duplicate')">📋 复制</div>
  <div class="context-menu-item" onclick="ctxAction('export')">↗ 导出</div>
  <div class="context-menu-sep"></div>
  <div class="context-menu-item" onclick="ctxAction('versions')">🕑 版本</div>
  <div class="context-menu-sep"></div>
  <div class="context-menu-item danger" onclick="ctxAction('delete')">🗑 删除</div>
</div>

<script>
// ==================== Config & State ====================
let files = {};
let activeFileId = null;
let selectedNodeId = null;
let panX = 0, panY = 0, scale = 1;
let undoStack = [], redoStack = [];
let isDirty = false;
let ctxTargetFileId = null;
let searchFilter = '';

// Color palette for lines (per depth)
const LINE_COLORS = ['#6c9fe7','#e8a84c','#4ade80','#e86cb5','#f0c246','#5ee8c5','#c084fc','#fb7185'];

// Layout config — tighter, organic
const H_GAP = 160, V_GAP = 6, NODE_H = 32;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ==================== File Management ====================
function newFile(name) {
  name = name || '未命名导图';
  const id = uid();
  const rootId = uid();
  const data = { nodes: { [rootId]: { id: rootId, text: name, children: [], parent: null, collapsed: false } }, rootId };
  files[id] = { name, data, versions: [], updatedAt: Date.now(), createdAt: Date.now() };
  switchToFile(id);
  selectNode(rootId);
  autoSaveAll();
}

function switchToFile(id) {
  if (!files[id]) return;
  activeFileId = id;
  selectedNodeId = null;
  undoStack = []; redoStack = [];
  panX = 80; panY = 0; scale = 1;
  isDirty = false;
  renderSidebar(); renderMap(); updateStatus();
  const f = files[id];
  if (f) selectNode(f.data.rootId);
}

function deleteFile(id) {
  if (!files[id]) return;
  delete files[id];
  if (activeFileId === id) {
    const ids = Object.keys(files);
    if (ids.length) switchToFile(ids[0]);
    else { activeFileId = null; newFile(); }
  }
  autoSaveAll(); renderSidebar();
}

function duplicateFile(id) {
  const src = files[id]; if (!src) return;
  const newId = uid();
  files[newId] = { name: src.name+' (副本)', data: JSON.parse(JSON.stringify(src.data)), versions: [], updatedAt: Date.now(), createdAt: Date.now() };
  switchToFile(newId); autoSaveAll(); toast('📋 已复制');
}

function renameFile(id, newName) {
  if (!files[id] || !newName.trim()) return;
  files[id].name = newName.trim();
  files[id].updatedAt = Date.now();
  autoSaveAll(); renderSidebar(); updateStatus();
}

// ==================== Versions ====================
function saveVersion(id, label) {
  const f = files[id]; if (!f) return;
  f.versions.push({ ts: Date.now(), data: JSON.parse(JSON.stringify(f.data)), label: label||'' });
  if (f.versions.length > 50) f.versions.shift();
  f.updatedAt = Date.now();
}

function restoreVersion(fileId, versionIdx) {
  const f = files[fileId]; if (!f || !f.versions[versionIdx]) return;
  saveVersion(fileId, '自动备份');
  f.data = JSON.parse(JSON.stringify(f.versions[versionIdx].data));
  f.updatedAt = Date.now();
  autoSaveAll();
  if (activeFileId === fileId) { renderMap(); selectNode(f.data.rootId); }
  toast('⏪ 已恢复'); renderSidebar(); showVersions(fileId);
}

// ==================== Save/Load ====================
function saveCurrentFile() {
  if (!activeFileId || !files[activeFileId]) return;
  saveVersion(activeFileId, '手动保存');
  isDirty = false;
  autoSaveAll(); updateStatus();
  toast('✅ 已保存 v' + files[activeFileId].versions.length);
  renderSidebar();
}

function autoSaveAll() {
  localStorage.setItem('mindflow_files', JSON.stringify(files));
  localStorage.setItem('mindflow_active', activeFileId || '');
}

function loadAllFiles() {
  try {
    const raw = localStorage.getItem('mindflow_files');
    if (raw) {
      files = JSON.parse(raw);
      const act = localStorage.getItem('mindflow_active');
      if (act && files[act]) { switchToFile(act); return; }
      const ids = Object.keys(files);
      if (ids.length) { switchToFile(ids[0]); return; }
    }
  } catch(e) {}
  newFile('我的思维导图');
}

// ==================== MCP ====================
function syncToMCP() {
  if (!activeFileId || !files[activeFileId]) return;
  const f = files[activeFileId];
  const json = JSON.stringify({ name: f.name, data: f.data, exportedAt: new Date().toISOString(), nodeCount: Object.keys(f.data.nodes).length }, null, 2);
  navigator.clipboard.writeText(json).then(() => toast('📋 已复制 — 发给 QiQi 同步到记忆')).catch(() => { toast('📋 已复制'); });
  try { window.parent.postMessage({ type: 'mindmap-save', name: f.name, data: f.data }, '*'); } catch(e) {}
}

// ==================== Undo/Redo ====================
function pushUndo() {
  const d = getData(); if (!d) return;
  undoStack.push(JSON.stringify(d));
  if (undoStack.length > 40) undoStack.shift();
  redoStack = [];
  isDirty = true; updateStatus();
}
function undo() {
  if (!undoStack.length) return;
  const d = getData(); if (d) redoStack.push(JSON.stringify(d));
  files[activeFileId].data = JSON.parse(undoStack.pop());
  renderMap(); updateStatus();
}
function redo() {
  if (!redoStack.length) return;
  const d = getData(); if (d) undoStack.push(JSON.stringify(d));
  files[activeFileId].data = JSON.parse(redoStack.pop());
  renderMap(); updateStatus();
}

function getData() {
  if (!activeFileId || !files[activeFileId]) return null;
  return files[activeFileId].data;
}

// ==================== Layout — organic spacing ====================
function layoutTree(data) {
  const pos = {};
  if (!data || !data.rootId) return pos;

  // Measure text width roughly
  function textW(text) { return Math.max(50, text.length * 13 + 28); }

  function getH(nid) {
    const n = data.nodes[nid]; if (!n) return NODE_H;
    if (n.collapsed || !n.children.length) return NODE_H;
    let t = 0;
    n.children.forEach((c,i) => { t += getH(c); if (i < n.children.length-1) t += V_GAP; });
    return Math.max(NODE_H, t);
  }

  function lay(nid, x, y, d) {
    const n = data.nodes[nid]; if (!n) return;
    const w = textW(n.text);
    pos[nid] = { x, y, depth: d, w };
    if (n.collapsed || !n.children.length) return;
    const th = getH(nid);
    let cy = y - th/2;
    n.children.forEach(cid => {
      const ch = getH(cid);
      lay(cid, x + w + 40, cy + ch/2, d+1);
      cy += ch + V_GAP;
    });
  }

  lay(data.rootId, 260, 450, 0);
  return pos;
}

// ==================== Render ====================
function renderMap() {
  const data = getData();
  const container = document.getElementById('mapContainer');
  const svg = document.getElementById('svgLines');
  container.querySelectorAll('.node').forEach(n => n.remove());
  svg.innerHTML = '';
  if (!data) return;
  const pos = layoutTree(data);

  // Draw curves — organic bezier, color matches child depth
  Object.entries(data.nodes).forEach(([id, node]) => {
    if (!node.children.length || node.collapsed) return;
    const p = pos[id]; if (!p) return;
    const px = p.x + p.w; // right edge of parent
    const py = p.y;
    node.children.forEach(cid => {
      const c = pos[cid]; if (!c) return;
      const color = LINE_COLORS[Math.min(c.depth, LINE_COLORS.length-1)];
      const cx = c.x;
      const cy = c.y;
      // S-curve with horizontal departure
      const dx = (cx - px);
      const cp1x = px + dx * 0.4;
      const cp2x = cx - dx * 0.4;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M${px},${py} C${cp1x},${py} ${cp2x},${cy} ${cx},${cy}`);
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', Math.max(1.2, 2 - c.depth * 0.15));
      path.setAttribute('stroke-opacity', '0.45');
      svg.appendChild(path);
    });
  });

  // Draw nodes
  Object.entries(pos).forEach(([id, p]) => {
    const node = data.nodes[id]; if (!node) return;
    const div = document.createElement('div');
    const depthClass = Math.min(p.depth, 7);
    div.className = `node depth-${depthClass} ${id===selectedNodeId?'selected':''}`;
    div.style.left = p.x + 'px';
    div.style.top = (p.y - NODE_H/2) + 'px';
    div.dataset.id = id;
    let extra = '';
    if (node.collapsed && node.children.length) {
      extra = `<span class="node-count">${countDesc(id)}</span>`;
    }
    div.innerHTML = `<div class="node-content" tabindex="-1">${esc(node.text)}</div>${extra}`;
    div.addEventListener('click', e => { e.stopPropagation(); selectNode(id); });
    div.addEventListener('dblclick', e => { e.stopPropagation(); editNode(id); });
    container.appendChild(div);
  });
  applyTransform();
  autoSaveAll();
}

function countDesc(id) {
  const d = getData(); const n = d.nodes[id]; if (!n) return 0;
  let c = n.children.length;
  n.children.forEach(cid => c += countDesc(cid));
  return c;
}

function applyTransform() {
  document.getElementById('mapContainer').style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zoomLevel').textContent = Math.round(scale*100)+'%';
}

function selectNode(id) {
  selectedNodeId = id;
  document.querySelectorAll('.node').forEach(n => n.classList.toggle('selected', n.dataset.id === id));
}

function editNode(id) {
  const data = getData(); if (!data || !data.nodes[id]) return;
  const node = data.nodes[id];
  const dom = document.querySelector(`.node[data-id="${id}"] .node-content`);
  if (!dom) return;
  pushUndo();
  dom.textContent = node.text;
  dom.contentEditable = true; dom.focus();
  const r = document.createRange(); r.selectNodeContents(dom);
  window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
  const finish = () => {
    dom.contentEditable = false;
    node.text = dom.textContent.trim() || node.text;
    renderMap(); selectNode(id);
  };
  dom.addEventListener('blur', finish, { once: true });
  dom.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); dom.blur(); }
    if (e.key === 'Escape') { dom.textContent = node.text; dom.blur(); }
    if (e.key === 'Tab') { e.preventDefault(); dom.blur(); }
  });
}

// ==================== Node Ops ====================
function addSibling(nodeId) {
  const data = getData(); if (!data) return;
  const node = data.nodes[nodeId];
  if (!node || !node.parent) { addChild(nodeId); return; }
  pushUndo();
  const parent = data.nodes[node.parent];
  const idx = parent.children.indexOf(nodeId);
  const newId = uid();
  data.nodes[newId] = { id: newId, text: '', children: [], parent: node.parent, collapsed: false };
  parent.children.splice(idx+1, 0, newId);
  renderMap(); selectNode(newId);
  setTimeout(() => editNode(newId), 50);
}

function addChild(nodeId) {
  const data = getData(); if (!data || !data.nodes[nodeId]) return;
  pushUndo();
  const newId = uid();
  data.nodes[newId] = { id: newId, text: '', children: [], parent: nodeId, collapsed: false };
  data.nodes[nodeId].children.push(newId);
  data.nodes[nodeId].collapsed = false;
  renderMap(); selectNode(newId);
  setTimeout(() => editNode(newId), 50);
}

function deleteNode(nodeId) {
  const data = getData(); if (!data) return;
  const node = data.nodes[nodeId];
  if (!node || !node.parent) return;
  pushUndo();
  function rm(id) { const n = data.nodes[id]; if (n) { n.children.forEach(c => rm(c)); delete data.nodes[id]; } }
  const parent = data.nodes[node.parent];
  const idx = parent.children.indexOf(nodeId);
  parent.children.splice(idx,1);
  const next = parent.children[Math.min(idx, parent.children.length-1)] || node.parent;
  rm(nodeId);
  renderMap(); selectNode(next);
}

function toggleCollapse(nodeId) {
  const data = getData(); if (!data || !data.nodes[nodeId]) return;
  pushUndo();
  data.nodes[nodeId].collapsed = !data.nodes[nodeId].collapsed;
  renderMap(); selectNode(nodeId);
}

// ==================== Keyboard ====================
document.addEventListener('keydown', e => {
  if (document.activeElement?.contentEditable === 'true' ||
      document.activeElement?.tagName === 'INPUT' ||
      document.activeElement?.tagName === 'TEXTAREA') return;
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z') { e.preventDefault(); if(e.shiftKey) redo(); else undo(); return; }
    if (e.key === 's') { e.preventDefault(); saveCurrentFile(); return; }
  }
  const data = getData(); if (!data || !selectedNodeId) return;
  if (e.key === 'Enter') { e.preventDefault(); addSibling(selectedNodeId); }
  else if (e.key === 'Tab') { e.preventDefault(); addChild(selectedNodeId); }
  else if (e.key === 'Delete' || (e.key === 'Backspace' && !e.ctrlKey)) { e.preventDefault(); deleteNode(selectedNodeId); }
  else if (e.key === 'F2') { e.preventDefault(); editNode(selectedNodeId); }
  else if (e.key === ' ') { e.preventDefault(); toggleCollapse(selectedNodeId); }
  else if (e.key.startsWith('Arrow')) { e.preventDefault(); navigateNode(e.key); }
});

function navigateNode(key) {
  const data = getData();
  const node = data.nodes[selectedNodeId]; if (!node) return;
  if (key==='ArrowLeft' && node.parent) selectNode(node.parent);
  else if (key==='ArrowRight' && node.children.length && !node.collapsed) selectNode(node.children[0]);
  else if ((key==='ArrowUp'||key==='ArrowDown') && node.parent) {
    const sibs = data.nodes[node.parent].children;
    const idx = sibs.indexOf(node.id);
    const next = key==='ArrowUp' ? idx-1 : idx+1;
    if (next>=0 && next<sibs.length) selectNode(sibs[next]);
  }
}

// ==================== Pan & Zoom ====================
const canvas = document.getElementById('canvas');
let isPanning = false, startX, startY;
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const isCanvas = e.target===canvas || e.target.id==='mapContainer' || e.target.tagName==='svg' || e.target.tagName==='path';
  if (isCanvas) { isPanning=true; startX=e.clientX-panX; startY=e.clientY-panY; canvas.classList.add('dragging'); }
});
window.addEventListener('mousemove', e => { if (!isPanning) return; panX=e.clientX-startX; panY=e.clientY-startY; applyTransform(); });
window.addEventListener('mouseup', () => { isPanning=false; canvas.classList.remove('dragging'); });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const d = e.deltaY > 0 ? 0.93 : 1.07;
  scale = Math.max(0.15, Math.min(3, scale*d));
  applyTransform();
}, { passive: false });
function zoomIn() { scale=Math.min(3,scale*1.2); applyTransform(); }
function zoomOut() { scale=Math.max(0.15,scale/1.2); applyTransform(); }
function zoomFit() { scale=1; panX=80; panY=0; applyTransform(); }

// ==================== Sidebar ====================
function renderSidebar() {
  const list = document.getElementById('fileList');
  const sorted = Object.entries(files)
    .filter(([_,f]) => !searchFilter || f.name.toLowerCase().includes(searchFilter))
    .sort((a,b) => b[1].updatedAt - a[1].updatedAt);
  list.innerHTML = sorted.map(([id,f]) => {
    const nc = Object.keys(f.data.nodes).length;
    return `<div class="file-item ${id===activeFileId?'active':''}" onclick="switchToFile('${id}')" oncontextmenu="showCtxMenu(event,'${id}')">
      <div class="file-name"><span>${esc(f.name)}</span>
        <div class="file-actions"><button class="file-action-btn" onclick="event.stopPropagation();showCtxMenu(event,'${id}')">⋯</button></div>
      </div>
      <div class="file-meta"><span>${nc} 节点</span><span>${timeAgo(f.updatedAt)}</span>${f.versions.length?`<span class="ver-badge">v${f.versions.length}</span>`:''}</div>
    </div>`;
  }).join('') || '<div style="padding:16px;text-align:center;color:var(--text-dim);font-size:11px">无匹配</div>';
}
function filterFiles(v) { searchFilter=v.toLowerCase(); renderSidebar(); }
function toggleSidebar() {
  const sb=document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  document.getElementById('sidebarToggleBtn').style.display = sb.classList.contains('collapsed')?'flex':'none';
}

// ==================== Context Menu ====================
function showCtxMenu(e,fid) { e.preventDefault(); e.stopPropagation(); ctxTargetFileId=fid;
  const m=document.getElementById('ctxMenu'); m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px'; m.classList.add('show'); }
document.addEventListener('click', () => document.getElementById('ctxMenu').classList.remove('show'));
function ctxAction(a) {
  document.getElementById('ctxMenu').classList.remove('show');
  if (!ctxTargetFileId) return;
  if (a==='rename') { document.getElementById('renameInput').value=files[ctxTargetFileId]?.name||''; document.getElementById('renameModal').classList.add('show'); setTimeout(()=>document.getElementById('renameInput').focus(),80); }
  else if (a==='duplicate') duplicateFile(ctxTargetFileId);
  else if (a==='export') { const f=files[ctxTargetFileId]; if(f) downloadText(JSON.stringify({name:f.name,data:f.data},null,2),f.name+'.json','application/json'); }
  else if (a==='versions') showVersions(ctxTargetFileId);
  else if (a==='delete') { if(confirm('确定删除?')) deleteFile(ctxTargetFileId); }
}

// ==================== Version Panel ====================
function showVersions(fid) {
  const f=files[fid]; const panel=document.getElementById('versionPanel'); const list=document.getElementById('versionList');
  if (!f || !f.versions.length) { panel.classList.remove('open'); toast('暂无版本'); return; }
  list.innerHTML = `<h4>${esc(f.name)} 版本历史</h4>` + f.versions.slice().reverse().map((v,ri) => {
    const idx=f.versions.length-1-ri; const d=new Date(v.ts);
    const time=d.toLocaleDateString('zh-CN')+' '+d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    const nc=Object.keys(v.data.nodes).length;
    return `<div class="version-item" onclick="restoreVersion('${fid}',${idx})">
      <div><div class="ver-time">${time}</div><div class="ver-label">${v.label||''} · ${nc}节点</div></div>
      <span class="ver-restore">恢复↩</span></div>`;
  }).join('');
  panel.classList.add('open');
}

// ==================== Modals ====================
function closeRenameModal() { document.getElementById('renameModal').classList.remove('show'); }
function doRename() { const n=document.getElementById('renameInput').value.trim(); if(n&&ctxTargetFileId) renameFile(ctxTargetFileId,n); closeRenameModal(); }
document.getElementById('renameInput').addEventListener('keydown', e => { if(e.key==='Enter') doRename(); if(e.key==='Escape') closeRenameModal(); });
function closeImportModal() { document.getElementById('importModal').classList.remove('show'); }
function doImport() {
  try { const o=JSON.parse(document.getElementById('importJSON').value.trim()); const id=uid();
    files[id]={name:o.name||'导入',data:o.data||o,versions:[],updatedAt:Date.now(),createdAt:Date.now()};
    switchToFile(id); autoSaveAll(); closeImportModal(); toast('📂 已导入');
  } catch(e) { toast('❌ JSON错误'); }
}

// ==================== Export ====================
function exportJSON() { const f=files[activeFileId]; if(!f) return; downloadText(JSON.stringify({name:f.name,data:f.data},null,2),f.name+'.json','application/json'); toast('📤 JSON'); }
function exportMarkdown() {
  const f=files[activeFileId]; if(!f) return;
  let md='';
  function w(nid,d) { const n=f.data.nodes[nid]; if(!n) return; if(d===0) md+='# '+n.text+'\n\n'; else md+='  '.repeat(d-1)+'- '+n.text+'\n'; n.children.forEach(c=>w(c,d+1)); }
  w(f.data.rootId,0);
  downloadText(md,f.name+'.md','text/markdown'); toast('📝 MD');
}
function downloadText(t,fn,m) { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([t],{type:m})); a.download=fn; a.click(); URL.revokeObjectURL(a.href); }

// ==================== Status ====================
function updateStatus() {
  const f=files[activeFileId];
  document.getElementById('statusDot').className='status-dot '+(isDirty?'unsaved':'saved');
  document.getElementById('statusSave').textContent=isDirty?'未保存':'已保存';
  if(!f) { document.getElementById('statusFile').textContent='—'; return; }
  const nc=Object.keys(f.data.nodes).length;
  document.getElementById('statusNodes').textContent=nc+'节点';
  let maxD=0; function gd(nid,d){maxD=Math.max(maxD,d);const n=f.data.nodes[nid];if(n)n.children.forEach(c=>gd(c,d+1));}
  gd(f.data.rootId,0);
  document.getElementById('statusDepth').textContent=maxD+'层';
  document.getElementById('statusFile').textContent=f.name;
}

// ==================== Paste ====================
document.addEventListener('paste', e => {
  if (document.activeElement?.contentEditable==='true'||document.activeElement?.tagName==='INPUT'||document.activeElement?.tagName==='TEXTAREA') return;
  const data=getData(); if(!data) return;
  const text=(e.clipboardData||window.clipboardData).getData('text');
  if(!text||!text.trim()) return;
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return;
  let spInd=0;
  for(const l of lines){const m=l.match(/^( +)/);if(m){const len=m[1].length;if(!spInd||len<spInd)spInd=len;}}
  function getD(l){
    if(l.startsWith('\t')){let d=0;while(d<l.length&&l[d]==='\t')d++;return d;}
    if(spInd&&l.startsWith(' ')){const m=l.match(/^( +)/);return m?Math.round(m[1].length/spInd):0;}
    const md=l.match(/^(\s*)-\s/);if(md){const ld=md[1].length;return spInd?Math.round(ld/spInd):Math.round(ld/2);}
    return 0;
  }
  function clean(l){return l.replace(/^\t+/,'').replace(/^\s*-\s/,'').replace(/^\s+/,'').trim();}
  e.preventDefault(); pushUndo();
  if(lines.length===1){const n=data.nodes[selectedNodeId];if(n){n.text=clean(lines[0]);renderMap();selectNode(selectedNodeId);toast('📋 粘贴');}return;}
  const pid=selectedNodeId||data.rootId;
  const bd=getD(lines[0]);
  const stk=[{id:pid,depth:bd-1}];
  lines.forEach(l=>{const d=getD(l);const t=clean(l);if(!t)return;
    while(stk.length>1&&stk[stk.length-1].depth>=d)stk.pop();
    const p=stk[stk.length-1].id;const nid=uid();
    data.nodes[nid]={id:nid,text:t,children:[],parent:p,collapsed:false};
    data.nodes[p].children.push(nid);data.nodes[p].collapsed=false;
    stk.push({id:nid,depth:d});
  });
  renderMap();selectNode(pid);toast('📋 粘贴 '+lines.length+' 节点');
});

// ==================== Utils ====================
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return Math.floor(s/86400)+'天前';}

// ==================== Init ====================
loadAllFiles();
</script>
